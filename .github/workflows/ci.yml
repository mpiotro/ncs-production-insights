name: CI

# CONTRIBUTING.md §CI: GitHub Actions runs pytest + pytest-cov on every PR and
# enforces the coverage ratchet (principle 9). The code is cross-platform; only the
# dev shell is Windows, so CI runs on Linux.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage gate
        run: uv run pytest

  # 004-T11: the frontend (React + Vite + TS) runs as a SEPARATE, parallel job — its own toolchain
  # (npm, not uv). Hermetic: it uses the committed openapi.json snapshot + the mock client, so it
  # needs no live 003 and no network beyond the npm registry. `npm run coverage` enforces the
  # frontend coverage ratchet (R6, principle 9 — tracked separately from the Python baseline);
  # `npm run typecheck` enforces the strict null-safety contract.
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (strict null-safety)
        run: npm run typecheck

      - name: Run tests with coverage gate
        run: npm run coverage
